<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />
    <!-- JS -->
    <script defer src="./app.js"></script>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>


<body>
    <header class="container">
        <h1 class="title">Job Application Tracker</h1>

        <section class="dashboard">
            <div class="dash-card">
                <p class="dash-label">Total</p>
                <p class="dash-number" id="totalCount">0</p>
            </div>

            <div class="dash-card">
                <p class="dash-label">Interview</p>
                <p class="dash-number-i" id="interviewCount">0</p>
            </div>

            <div class="dash-card">
                <p class="dash-label">Rejected</p>
                <p class="dash-number-r" id="rejectedCount">0</p>
            </div>
        </section>
        <hr>
    </header>


    <main class="container">
        <section class="jobs-section">
            <div class="jobs-header">
                <h2 class="section-title">Available Jobs</h2>
                <p class="jobs-count"><span id="tabCount">0</span> jobs</p>
            </div>

            <div class="tabs" id="tabs">
                <button class="tab active" data-tab="all" type="button">All</button>
                <button class="tab" data-tab="interview" type="button">Interview</button>
                <button class="tab" data-tab="rejected" type="button">Rejected</button>
            </div>

            <div id="jobsContainer" class="jobs-container"></div>
        </section>
    </main>
</body>
</html>
